<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel kursu · makieta V2</title>
<meta name="robots" content="noindex, nofollow">
<script>(function(){try{if(localStorage.getItem("cm_theme_e")==="dark"){document.documentElement.setAttribute("data-theme","dark")}}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Funnel+Sans:wght@300..800&display=swap" rel="stylesheet">
<style>
  /* PANEL KURSU · makieta V2 (kierunek "Cursor calm").
     Jeden układ: lekcja na środku, spis lekcji w popupie "Wszystkie lekcje".
     4 typy lekcji: tekst / wideo / ćwiczenie interaktywne / zadanie praktyczne (osobna podstrona).
     Postęp: pastylka modułu w lewym górnym rogu (bliski cel), przycisk "Wszystkie lekcje"
     wypełnia się kolorem od lewej wg postępu kursu, pełny pasek postępu na górze popupu.
     Bez paska przez ekran, bez procentu w belce, bez odznak/streaków/konfetti.
     Cała TREŚĆ jest w edytowalnym bloku var KURS = [...]; logika tylko ją czyta. */
  :root{
    --bg:#F7F6F3;--panel:#F0EFEA;--pill:#ECEAE5;--ink:#1A1A1A;--sub:#696760;
    --hair:rgba(26,26,23,.09);--btn-bg:#1A1A1A;--btn-fg:#FFFFFF;--acc:#DB511D;
    --win-sh:rgba(26,26,23,.07);--fill:color-mix(in srgb,var(--acc) 15%,transparent);
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;
    --side:0px;
  }
  html[data-theme="dark"]{
    --bg:#141413;--panel:#1E1E1C;--pill:#262624;--ink:#EDECE8;--sub:#9A988F;
    --hair:rgba(237,236,232,.10);--btn-bg:#FFFFFF;--btn-fg:#141413;--acc:#F26430;
    --win-sh:rgba(0,0,0,.4);--fill:color-mix(in srgb,var(--acc) 24%,transparent);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  body{font-family:"Funnel Sans",system-ui,sans-serif;background:var(--bg);color:var(--ink);
    font-size:17px;line-height:1.65;transition:background-color .2s ease-out,color .2s ease-out;padding-bottom:96px}
  a{color:inherit}
  a:focus-visible,button:focus-visible,summary:focus-visible{outline:2px solid var(--ink);outline-offset:3px;border-radius:12px}

  /* ---------- górna belka ---------- */
  .top{position:sticky;top:0;z-index:30;margin-left:var(--side);
    background:color-mix(in srgb,var(--bg) 90%,transparent);
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid transparent}
  .top-in{max-width:900px;margin:0 auto;padding:14px 28px;display:flex;align-items:center;gap:14px}
  .back{display:inline-flex;align-items:center;gap:8px;text-decoration:none;font-size:14px;font-weight:500;color:var(--sub);
    padding:7px 12px;border-radius:999px;transition:background-color .15s ease-out,color .15s ease-out}
  .back svg{width:13px;height:13px}
  @media(hover:hover){.back:hover{background:var(--pill);color:var(--ink)}}

  /* pastylka bieżącego modułu = bliski cel */
  .mpill{display:flex;align-items:center;gap:10px;background:var(--pill);border-radius:999px;padding:6px 14px;
    font-size:13px;font-weight:600;white-space:nowrap}
  .mpill .bar{width:76px;height:5px;border-radius:3px;flex:none;overflow:hidden;
    background:color-mix(in srgb,var(--ink) 11%,transparent)}
  .mpill .bar i{display:block;height:100%;background:var(--acc);transition:width .35s cubic-bezier(.22,1,.36,1)}
  .mpill .n{font-family:var(--mono);font-size:11.5px;color:var(--sub)}

  /* przełącznik układu */

  /* przycisk spisu: wypełnia się od lewej wg postępu kursu */
  .toc-btn{margin-left:auto;position:relative;overflow:hidden;display:inline-flex;align-items:center;gap:8px;background:var(--pill);
    border:none;border-radius:999px;padding:9px 16px;font-family:inherit;font-size:13.5px;font-weight:600;
    color:var(--ink);cursor:pointer}
  .toc-btn .fill{position:absolute;left:0;top:0;bottom:0;width:0;pointer-events:none;
    background:linear-gradient(90deg,var(--fill) 0,var(--fill) calc(100% - 14px),transparent 100%);
    transition:width .45s cubic-bezier(.22,1,.36,1)}
  .toc-btn svg,.toc-btn span.lb{position:relative;z-index:1}
  .toc-btn svg{width:14px;height:14px}
  @media(hover:hover){.toc-btn:hover{background:color-mix(in srgb,var(--pill) 80%,var(--ink) 8%)}}

  .theme-btn{width:34px;height:34px;border-radius:999px;border:none;cursor:pointer;background:var(--pill);color:var(--ink);
    display:grid;place-items:center;flex:none}
  .theme-btn svg{display:block;width:15px;height:15px}
  .theme-btn .ic-sun{display:none}.theme-btn .ic-moon{display:block}
  html[data-theme="dark"] .theme-btn .ic-sun{display:block}
  html[data-theme="dark"] .theme-btn .ic-moon{display:none}

  

  /* ---------- treść lekcji ---------- */
  .main{margin-left:var(--side)}
  .stage{max-width:680px;margin:0 auto;padding:56px 28px 0}
  .badge{display:inline-flex;align-items:center;gap:7px;background:var(--pill);border-radius:999px;padding:5px 13px;
    font-size:12.5px;font-weight:650;color:var(--ink)}
  .badge svg{width:13px;height:13px}
  .lastl{font-size:12.5px;font-weight:650;color:var(--acc);margin-left:11px}
  .stage h1{font-size:clamp(28px,4vw,36px);font-weight:650;letter-spacing:-.022em;line-height:1.18;margin-top:18px;text-wrap:balance}
  .stage .body{margin-top:28px}
  .stage .body p{font-size:17.5px;color:var(--sub);line-height:1.72;text-wrap:pretty}
  .stage .body p + p{margin-top:16px}
  .stage .body p strong{color:var(--ink);font-weight:600}

  .thumb{position:relative;aspect-ratio:16/9;border-radius:18px;overflow:hidden;background:var(--pill);border:1px solid var(--hair);
    display:grid;place-items:center;cursor:pointer}
  .thumb::after{content:"";position:absolute;inset:0;background:radial-gradient(120% 90% at 50% 0%,color-mix(in srgb,var(--ink) 6%,transparent),transparent 70%)}
  .play{position:relative;z-index:1;width:66px;height:66px;border-radius:999px;background:var(--btn-bg);color:var(--btn-fg);
    display:grid;place-items:center;transition:transform .2s ease-out}
  @media(hover:hover){.thumb:hover .play{transform:scale(1.07)}}
  .play svg{width:21px;height:21px;margin-left:3px}
  .dur{position:absolute;right:12px;bottom:12px;z-index:1;font-size:12px;font-family:var(--mono);padding:3px 8px;border-radius:6px;
    background:color-mix(in srgb,var(--bg) 82%,transparent);color:var(--sub)}

  .links{margin-top:26px;border-top:1px solid var(--hair);padding-top:16px}
  .links .lk-h{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--sub);font-weight:650;margin-bottom:6px}
  .links li{list-style:none}
  .links a{display:inline-flex;align-items:center;gap:8px;font-size:15px;font-weight:500;text-decoration:none;padding:6px 0;
    transition:color .15s ease-out}
  @media(hover:hover){.links a:hover{color:var(--acc)}}
  .links svg{width:13px;height:13px;color:var(--sub);flex:none}

  .ex{background:var(--panel);border-radius:20px;padding:28px}
  .ex-q{font-size:17px;font-weight:600;margin-bottom:18px;text-wrap:balance}
  .ex-row{padding:16px 0;border-top:1px solid var(--hair)}
  .ex-row:first-of-type{border-top:none;padding-top:0}
  .ex-row .d{font-size:16px;color:var(--sub);line-height:1.5;margin-bottom:10px}
  .chips{display:flex;gap:8px;flex-wrap:wrap}
  .chip{font-family:inherit;font-size:14px;font-weight:600;padding:9px 17px;border-radius:999px;border:1px solid var(--hair);
    background:var(--bg);color:var(--ink);cursor:pointer;transition:all .15s ease-out}
  @media(hover:hover){.chip:hover{border-color:color-mix(in srgb,var(--ink) 22%,transparent)}}
  .chip.ok{background:var(--acc);border-color:var(--acc);color:#fff;cursor:default}
  .chip.no{opacity:.35;text-decoration:line-through;cursor:default}
  .ex-row.solved .chip:not(.ok){opacity:.3;pointer-events:none}
  .ex-foot{font-size:15px;color:var(--sub);margin-top:18px;min-height:24px}
  .ex-foot.done{color:var(--acc);font-weight:600}

  .win{background:var(--bg);border:1px solid var(--hair);border-radius:14px;box-shadow:0 10px 26px var(--win-sh);overflow:hidden}
  .win-bar{display:flex;align-items:center;gap:5px;padding:9px 11px;border-bottom:1px solid var(--hair)}
  .win-bar i{width:7px;height:7px;border-radius:999px;background:var(--hair)}
  .win-bar span{margin-left:4px;font-family:var(--mono);font-size:10px;color:var(--sub)}
  .term{padding:16px;font-family:var(--mono);font-size:13.5px;line-height:1.7;color:var(--sub)}
  .term .out{white-space:pre-wrap}
  .term .pr{display:flex;align-items:center;gap:8px;margin-top:6px}
  .term .pr b{color:var(--acc);font-weight:700}
  .term input{flex:1;background:none;border:none;outline:none;font-family:var(--mono);font-size:13.5px;color:var(--ink)}
  .term .ok{color:var(--acc);font-weight:700}

  .task{background:var(--panel);border-radius:20px;padding:30px}
  .task .tk{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--sub);font-weight:650}
  .task .tk b{color:var(--acc)}
  .task p{font-size:16px;color:var(--sub);line-height:1.6;margin-top:12px}
  .task .steps{margin-top:20px;border-top:1px solid var(--hair);padding-top:18px;display:grid;gap:11px}
  .task .steps div{font-size:15px;color:var(--sub);display:flex;gap:12px;align-items:flex-start}
  .task .steps b{color:var(--acc);font-weight:700;font-family:var(--mono);font-size:12.5px;padding-top:3px;flex:none}
  .task .go{margin-top:24px}

  /* ---------- dolny pasek ---------- */
  .foot{position:fixed;left:var(--side);right:0;bottom:0;z-index:25;background:color-mix(in srgb,var(--bg) 92%,transparent);
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid var(--hair)}
  .foot-in{max-width:680px;margin:0 auto;padding:16px 28px;display:flex;align-items:center;gap:14px}
  .btn{display:inline-flex;align-items:center;gap:9px;text-decoration:none;border:none;cursor:pointer;font-family:inherit;
    font-size:15px;font-weight:650;padding:14px 26px;border-radius:999px;background:var(--btn-bg);color:var(--btn-fg);
    transition:background-color .18s ease-out,transform .18s ease-out}
  @media(hover:hover){.btn:hover{background:color-mix(in srgb,var(--btn-bg) 86%,var(--bg))}}
  .btn:active{transform:scale(.98)}
  .btn svg{width:15px;height:15px;transition:transform .18s ease-out}
  @media(hover:hover){.btn:hover svg{transform:translateX(3px)}}
  .btn.ghost{background:transparent;color:var(--sub);border:1px solid var(--hair);padding:13px 18px;font-weight:600}
  @media(hover:hover){.btn.ghost:hover{background:var(--pill);color:var(--ink)}}
  .btn.ghost svg{transform:none}
  .foot .nxt{margin-left:auto;display:flex;align-items:center;gap:12px}
  .foot .nxt .lbl{font-size:13px;color:var(--sub);text-align:right;max-width:170px;line-height:1.3}

  /* ---------- popup ze spisem ---------- */
  .sheet{position:fixed;inset:0;z-index:40;display:none}
  .sheet.on{display:block}
  .sheet .veil{position:absolute;inset:0;background:color-mix(in srgb,var(--ink) 28%,transparent)}
  .sheet .box{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(560px,calc(100% - 32px));
    max-height:80vh;overflow:auto;background:var(--bg);border:1px solid var(--hair);border-radius:22px;
    box-shadow:0 30px 80px rgba(0,0,0,.22);padding:28px}
  .sheet h2{font-size:19px;font-weight:650;letter-spacing:-.012em}
  /* postęp kursu na górze popupu */
  .prog{margin:16px 0 22px;padding-bottom:20px;border-bottom:1px solid var(--hair)}
  .prog .pb{height:8px;border-radius:4px;background:var(--pill);overflow:hidden}
  .prog .pb i{display:block;height:100%;background:var(--acc);transition:width .45s cubic-bezier(.22,1,.36,1)}
  .prog .pt{margin-top:10px;display:flex;align-items:baseline;justify-content:space-between;font-size:13.5px;color:var(--sub)}
  .prog .pt b{color:var(--ink);font-weight:650}
  .prog .pt .pc{font-family:var(--mono);font-size:12.5px}
  .sheet .mg + .mg{margin-top:20px}
  .sheet .mg h3{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--sub);font-weight:650;margin-bottom:6px;
    display:flex;align-items:center;gap:10px}
  .sheet .mg h3 .mnm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .sheet .mg h3 .mn{font-family:var(--mono);font-size:11px;letter-spacing:0}
  .li{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:none;border:none;cursor:pointer;
    font-family:inherit;font-size:15px;color:var(--sub);padding:9px 11px;border-radius:11px;line-height:1.35;
    transition:background-color .15s ease-out,color .15s ease-out}
  @media(hover:hover){.li:hover{background:var(--pill);color:var(--ink)}}
  .li .st{width:16px;height:16px;border-radius:999px;border:1.5px solid var(--hair);flex:none;display:grid;place-items:center;font-size:9px}
  .li.done .st{background:var(--acc);border-color:var(--acc);color:#fff}
  .li.done .st::after{content:"✓";font-weight:700}
  .li.active{background:var(--pill);color:var(--ink);font-weight:600}
  .li.active .st{border-color:var(--acc);box-shadow:0 0 0 3px color-mix(in srgb,var(--acc) 18%,transparent)}
  .li .tt{flex:1;overflow:hidden;text-overflow:ellipsis}
  .li .ty{width:14px;height:14px;flex:none;color:var(--sub)}
  .li .ty svg{width:14px;height:14px;display:block}
  .sheet .close{position:absolute;right:18px;top:18px;width:34px;height:34px;border-radius:999px;border:none;background:var(--pill);
    color:var(--ink);cursor:pointer;display:grid;place-items:center}
  .sheet .close svg{width:14px;height:14px}

  @media(max-width:720px){
    .top-in{padding:10px 14px;gap:8px}
    .stage{padding:36px 16px 0}
    .mpill .nm{display:none}
    .mpill{padding:5px 11px;gap:7px}
    .mpill .bar{width:40px}
    .back{padding:7px 8px}
    .toc-btn{margin-left:auto;flex:none;white-space:nowrap;padding:9px 14px;font-size:13px;gap:7px}
    .foot-in{padding:12px 16px;gap:10px}
    .foot .nxt .lbl{display:none}
    .ex,.task{padding:20px}
    .sheet .box{padding:22px}
  }
  @media(prefers-reduced-motion:reduce){*,*::before,*::after{transition:none !important;animation:none !important}}
</style>
</head>
<body>



<div class="top">
  <div class="top-in">
    <a class="back" href="/app/">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5M11 6l-6 6 6 6"/></svg>
      Kokpit
    </a>
    <div class="mpill" id="mp"></div>

    

    <button class="toc-btn" type="button" id="toc-btn">
      <span class="fill" id="fill" aria-hidden="true"></span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      <span class="lb">Wszystkie lekcje</span>
    </button>
    <button class="theme-btn" id="theme-btn" type="button" aria-label="Przełącz motyw jasny lub ciemny">
      <svg class="ic-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
      <svg class="ic-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
    </button>
  </div>
</div>

<main class="main"><div class="stage" id="stage"></div></main>

<div class="foot">
  <div class="foot-in" id="foot"></div>
</div>

<div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-label="Spis lekcji">
  <div class="veil" data-close></div>
  <div class="box">
    <button class="close" type="button" data-close aria-label="Zamknij">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"/></svg>
    </button>
    <h2>Kurs Claude Code</h2>
    <div class="prog">
      <div class="pb" aria-hidden="true"><i id="pbar"></i></div>
      <div class="pt"><b id="pnum"></b><span class="pc" id="ppc"></span></div>
    </div>
    <div id="toc"></div>
  </div>
</div>

<script>
/* ====================== TREŚĆ (edytowalna) ====================== */
var KURS = [
  { m:"Moduł 1 · Jak działa Claude Code", lekcje:[
    { id:"1-1", typ:"tekst", tytul:"LLM, modele i narzędzia", czas:"4 min", done:true,
      tresc:["Model językowy to maszynka do tekstu. Dostaje tekst, oddaje tekst i nic więcej sam z siebie nie potrafi. Nie otworzy Ci pliku, nie wejdzie na stronę, nie zapisze dokumentu.",
             "<strong>Claude Code to warstwa, która daje modelowi ręce.</strong> Czyta pliki, zapisuje zmiany, uruchamia komendy. Model decyduje co zrobić, Claude Code to wykonuje."] },
    { id:"1-2", typ:"wideo", tytul:"Claude Code jako dyrygent", czas:"6:12", done:true,
      tresc:["Na filmie pokazuję, dlaczego to model gra, a Claude Code tylko dyryguje. Zobaczysz, jak jedno polecenie zamienia się w cztery różne akcje."],
      linki:[["Oficjalna dokumentacja Claude Code","https://code.claude.com/docs"],["Ściąga: modele i do czego który (PDF)","#"]] },
    { id:"1-3", typ:"cwiczenie", tytul:"Dopasuj pojęcie do opisu", czas:"2 min", done:true, cw:"match",
      pytanie:"Kliknij pojęcie, które pasuje do opisu.",
      wiersze:[["Zamienia tekst w tekst, sam nie sięga do plików.",["Model*","Narzędzie","Terminal"]],
               ["Pozwala modelowi przeczytać i zapisać plik u Ciebie.",["Model","Narzędzie*","Wtyczka"]],
               ["Okno, w którym rozmawiasz z komputerem tekstem.",["Model","Narzędzie","Terminal*"]]] }
  ]},
  { m:"Moduł 2 · Terminal i VS Code", lekcje:[
    { id:"2-1", typ:"tekst", tytul:"Terminal: pwd, ls, cd", czas:"5 min", done:true,
      tresc:["Trzy komendy wystarczą Ci na start. <strong>pwd</strong> mówi, gdzie jesteś. <strong>ls</strong> pokazuje, co leży w tym miejscu. <strong>cd</strong> przenosi Cię do innego folderu.",
             "Nie musisz ich pamiętać. Wpiszesz je może pięć razy w życiu, ale gdy zobaczysz je w instrukcji, będziesz wiedzieć, co się właśnie stało."] },
    { id:"2-2", typ:"wideo", tytul:"Instalacja VS Code krok po kroku", czas:"4:30", done:false,
      tresc:["Instalujemy razem, klik po kliku, osobno na Maca i osobno na Windows. <strong>Pobieraj VS Code tylko z code.visualstudio.com</strong>, nie przez żadną integrację Copilota."],
      linki:[["Pobierz VS Code (oficjalna strona)","https://code.visualstudio.com"],["Instrukcja tekstowa, gdyby coś poszło nie tak","#"]] },
    { id:"2-3", typ:"cwiczenie", tytul:"Wpisz komendę w terminalu", czas:"3 min", done:false, cw:"term",
      pytanie:"Wyświetl listę plików w folderze. Wpisz komendę i wciśnij Enter." },
    { id:"2-4", typ:"zadanie", tytul:"Twój pierwszy folder pracy", czas:"15 min", done:false,
      tresc:["Pobierasz gotowy folder, otwierasz go w VS Code i odpalasz w nim Claude Code pierwszy raz."],
      kroki:["Pobierasz folder na swój komputer","Otwierasz go w VS Code","Odpalasz Claude Code i wpisujesz pierwsze polecenie"],
      link:"badanie-rynku-w-niszy.html" }
  ]},
  { m:"Moduł 3 · Praca z Claude Code", lekcje:[
    { id:"3-1", typ:"tekst", tytul:"Tryby zgód: Plan, Ask, Auto", czas:"4 min", done:false,
      tresc:["Tryb zgód decyduje, ile Claude może zrobić bez pytania Ciebie o zdanie. Zaczynasz od trybu, w którym pyta o wszystko, i luzujesz go dopiero, gdy wiesz, co się dzieje."] },
    { id:"3-2", typ:"wideo", tytul:"Wybór modelu: Haiku, Sonnet, Opus", czas:"5:40", done:false,
      tresc:["Trzech muzyków, każdy o innej cenie i mocy. Pokazuję na żywym zadaniu, kiedy tańszy model wystarczy."],
      linki:[["Porównanie modeli w dokumentacji","https://code.claude.com/docs"]] },
    { id:"3-3", typ:"cwiczenie", tytul:"Dobierz model do zadania", czas:"3 min", done:false, cw:"match",
      pytanie:"Który model bierzesz do takiego zadania?",
      wiersze:[["Przepisz 200 nazw plików według schematu.",["Haiku*","Sonnet","Opus"]],
               ["Zaplanuj przebudowę całej oferty i uzasadnij ceny.",["Haiku","Sonnet","Opus*"]]] },
    { id:"3-4", typ:"zadanie", tytul:"Badanie rynku w niszy", czas:"20 min", done:false,
      tresc:["Odpalasz pięciu tanich agentów naraz. Każdy bada inny wycinek rynku, a jeden mocniejszy skleja z tego gotowy raport z rekomendacją."],
      kroki:["Pobierasz folder zadania","Podmieniasz niszę na swoją","Odpalasz agentów i czytasz raport"],
      link:"badanie-rynku-w-niszy.html" }
  ]}
];
/* ==================== KONIEC TREŚCI ==================== */

var TYPY = {
  tekst:    { label:"Lekcja tekstowa", ico:'<path d="M5 5h14M5 10h14M5 15h9"/>', stroke:true },
  wideo:    { label:"Wideo",           ico:'<path d="M7 4.5v15l13-7.5z"/>', stroke:false },
  cwiczenie:{ label:"Ćwiczenie",       ico:'<circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="2.5"/>', stroke:true },
  zadanie:  { label:"Zadanie",         ico:'<path d="M3 7h6l2 2h10v10H3z"/><path d="M12 12v4M10 14l2 2 2-2"/>', stroke:true }
};
function ikona(typ){
  var t=TYPY[typ];
  return '<svg viewBox="0 0 24 24" '+(t.stroke?'fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"':'fill="currentColor"')+' aria-hidden="true">'+t.ico+'</svg>';
}
var FLAT=[]; KURS.forEach(function(mo,mi){ mo.lekcje.forEach(function(l,li){ FLAT.push(Object.assign({},l,{mi:mi,li:li,mnaz:mo.m,ile:mo.lekcje.length})) }) });
var cur=4;
function idx(l){ return FLAT.findIndex(function(f){return f.id===l.id}) }
function zrobione(mo){ return mo.lekcje.filter(function(x){ return FLAT[idx(x)].done }).length }

function render(){
  var l=FLAT[cur], t=TYPY[l.typ], h="";
  h+='<span class="badge">'+ikona(l.typ)+t.label+' · '+l.czas+'</span>';
  if(l.li===l.ile-1){ h+='<span class="lastl">ostatnia w module</span>' }
  h+='<h1>'+l.tytul+'</h1><div class="body">';

  if(l.typ==="wideo"){
    h+='<div class="thumb" role="button" tabindex="0" aria-label="Odtwórz wideo"><span class="play"><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M7 4.5v15l13-7.5z"/></svg></span><span class="dur">'+l.czas+'</span></div>';
  }
  if(l.tresc && l.typ!=="zadanie"){ h+='<div style="margin-top:'+(l.typ==="wideo"?"26px":"0")+'">'+l.tresc.map(function(p){return "<p>"+p+"</p>"}).join("")+'</div>' }
  if(l.linki){
    h+='<div class="links"><div class="lk-h">Pod filmem</div><ul>';
    l.linki.forEach(function(a){ h+='<li><a href="'+a[1]+'" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 4h6v6M20 4L10 14M18 14v6H4V6h6"/></svg>'+a[0]+'</a></li>' });
    h+='</ul></div>';
  }
  if(l.typ==="cwiczenie"){
    h+='<div class="ex" data-ex="'+l.cw+'"><div class="ex-q">'+l.pytanie+'</div>';
    if(l.cw==="match"){
      l.wiersze.forEach(function(w){
        h+='<div class="ex-row"><div class="d">'+w[0]+'</div><div class="chips">';
        w[1].forEach(function(c){ var ok=c.slice(-1)==="*"; h+='<button class="chip"'+(ok?' data-ok="1"':'')+'>'+(ok?c.slice(0,-1):c)+'</button>' });
        h+='</div></div>';
      });
      h+='<div class="ex-foot">0 z '+l.wiersze.length+'</div>';
    } else {
      h+='<div class="win"><div class="win-bar"><i></i><i></i><i></i><span>terminal</span></div>'
        +'<div class="term"><div class="out" data-out>~/agenci/sklep</div>'
        +'<div class="pr"><b>$</b><input type="text" aria-label="Wpisz komendę" autocomplete="off" spellcheck="false" placeholder="wpisz komendę"></div></div></div>'
        +'<div class="ex-foot"></div>';
    }
    h+='</div>';
  }
  if(l.typ==="zadanie"){
    h+='<div class="task"><div class="tk"><b>Robisz u siebie</b> · osobna strona zadania</div><p>'+l.tresc[0]+'</p><div class="steps">';
    l.kroki.forEach(function(k,i){ h+='<div><b>'+(i+1)+'</b><span>'+k+'</span></div>' });
    h+='</div><div class="go"><a class="btn" href="'+l.link+'">Otwórz zadanie <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></a></div></div>';
  }
  h+='</div>';
  document.getElementById("stage").innerHTML=h;

  /* dolny pasek */
  var f="";
  if(cur>0){ f+='<button class="btn ghost" type="button" data-go="'+(cur-1)+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M11 6l-6 6 6 6"/></svg>Wstecz</button>' }
  if(cur<FLAT.length-1){
    var nx=FLAT[cur+1];
    f+='<span class="nxt"><span class="lbl">Dalej: '+nx.tytul+'</span>'
      +'<button class="btn" type="button" data-go="'+(cur+1)+'" data-adv>Dalej <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button></span>';
  } else {
    f+='<span class="nxt"><button class="btn" type="button">Koniec modułu <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button></span>';
  }
  document.getElementById("foot").innerHTML=f;

  postep(); toc(); wire();
}

/* ---------- postęp: pastylka modułu, wypełnienie przycisku, liczby w popupie ---------- */
function postep(){
  var l=FLAT[cur], d=FLAT.filter(function(f){return f.done}).length, pc=Math.round(d/FLAT.length*100);
  var md=zrobione(KURS[l.mi]);

  document.getElementById("mp").innerHTML='<span class="nm">'+l.mnaz.split(" · ")[0]+'</span>'
    +'<span class="bar"><i style="width:'+Math.round(md/l.ile*100)+'%"></i></span>'
    +'<span class="n">'+md+'/'+l.ile+'</span>';

  document.getElementById("fill").style.width=pc+"%";
  document.getElementById("pbar").style.width=pc+"%";
  document.getElementById("pnum").textContent=d+" z "+FLAT.length+" lekcji zrobione";
  document.getElementById("ppc").textContent=pc+"%";

  var sb=document.getElementById("sbar");
  if(sb){
    sb.style.width=pc+"%";
    document.getElementById("stxt").innerHTML='<b>'+d+' z '+FLAT.length+'</b> lekcji';
    document.getElementById("spc").textContent=pc+"%";
  }
}

/* ---------- spis w popupie ---------- */
function toc(){
  var h="";
  KURS.forEach(function(mo){
    h+='<div class="mg"><h3><span class="mnm">'+mo.m+'</span><span class="mn">'+zrobione(mo)+'/'+mo.lekcje.length+'</span></h3>';
    mo.lekcje.forEach(function(l){
      var i=idx(l);
      h+='<button class="li'+(FLAT[i].done?" done":"")+(i===cur?" active":"")+'" data-i="'+i+'" type="button">'
        +'<span class="st" aria-hidden="true"></span><span class="tt">'+l.tytul+'</span>'
        +'<span class="ty" aria-hidden="true">'+ikona(l.typ)+'</span></button>';
    });
    h+='</div>';
  });
  document.getElementById("toc").innerHTML=h;
}



/* ---------- ćwiczenia na karcie ---------- */
function wire(){
  var ex=document.querySelector('[data-ex="match"]');
  if(ex){
    var rows=ex.querySelectorAll(".ex-row"),foot=ex.querySelector(".ex-foot"),tot=rows.length,ok=0;
    rows.forEach(function(row){
      row.querySelectorAll(".chip").forEach(function(c){
        c.addEventListener("click",function(){
          if(row.classList.contains("solved"))return;
          if(c.dataset.ok){c.classList.add("ok");row.classList.add("solved");ok++;foot.textContent=ok+" z "+tot;
            if(ok===tot){foot.textContent="Komplet "+tot+" z "+tot+" ✓";foot.classList.add("done")}}
          else{c.classList.add("no")}
        });
      });
    });
  }
  var tx=document.querySelector('[data-ex="term"]');
  if(tx){
    var inp=tx.querySelector("input"),out=tx.querySelector("[data-out]"),tf=tx.querySelector(".ex-foot"),miss=0;
    inp.addEventListener("keydown",function(e){
      if(e.key!=="Enter")return;
      var v=inp.value.trim(); if(!v)return;
      if(v==="ls"){
        out.innerHTML+="\n$ ls\noferta.md   ceny.csv   notatki/   raport.md";
        tf.innerHTML='<span class="ok">Dokładnie tak. To wszystko, co leży w tym folderze.</span>';
        tf.classList.add("done"); inp.value=""; inp.disabled=true;
      } else {
        miss++; out.innerHTML+="\n$ "+v+"\nzsh: command not found: "+v;
        tf.textContent = miss>=2 ? "Podpowiedź: to dwie litery, skrót od „list”." : "Nie ta komenda. Spróbuj jeszcze raz.";
        inp.value="";
      }
    });
  }
}

/* ---------- nawigacja (delegowana, bo listy przebudowują się co render) ---------- */
document.addEventListener("click",function(e){
  var go=e.target.closest("[data-go]");
  if(go){
    if(go.hasAttribute("data-adv")) FLAT[cur].done=true;
    cur=+go.dataset.go; render(); window.scrollTo({top:0,behavior:"smooth"}); return;
  }
  var li=e.target.closest("[data-i]");
  if(li){
    cur=+li.dataset.i; document.getElementById("sheet").classList.remove("on"); render(); window.scrollTo({top:0});
  }
});


/* ---------- motyw i popup ---------- */
(function(){var b=document.getElementById("theme-btn"),r=document.documentElement;
b.addEventListener("click",function(){var d=r.getAttribute("data-theme")==="dark";
if(d){r.removeAttribute("data-theme")}else{r.setAttribute("data-theme","dark")}
try{localStorage.setItem("cm_theme_e",d?"light":"dark")}catch(e){}})})();

(function(){
  var s=document.getElementById("sheet");
  document.getElementById("toc-btn").addEventListener("click",function(){ s.classList.add("on") });
  s.addEventListener("click",function(e){ if(e.target.hasAttribute("data-close")||e.target.closest("[data-close]")) s.classList.remove("on") });
  document.addEventListener("keydown",function(e){ if(e.key==="Escape") s.classList.remove("on") });
})();

render();
</script>
</body>
</html>
